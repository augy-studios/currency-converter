<!doctype html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMCYFTFPEL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());

        gtag('config', 'G-FMCYFTFPEL');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9715826188316382"
        crossorigin="anonymous"></script>

    <link rel="manifest" href="/manifest.json" />

    <meta charset="utf-8">
    <title>Currency Converter | UwU Apps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A simple weather app; view today's weather at a glance!">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Currency Converter | UwU Apps" />
    <meta property="og:site_name" content="UwU Apps" />
    <meta property="og:description" content="A simple weather app; view today's weather at a glance!" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Jua">
    <link rel="stylesheet" href="/style.css">

    <!-- Embed Image -->
    <link rel="apple-touch-icon" href="/converticon1.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image:src" content="/converticon1.png">
    <meta property="og:image" content="/converticon1.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script defer="" src="https://use.fontawesome.com/releases/v6.5.2/js/all.js"></script>
</head>

<body>
    <main class="container">
        <section class="card">
            <header class="card__header">
                <div class="brand">
                    <div class="brand__logo" aria-hidden="true">$</div>
                    <h1 class="brand__title">Currency Converter</h1>
                </div>
                <div class="meta">
                    <span id="last-updated" class="meta__updated" aria-live="polite"></span>
                    <button id="refresh" class="btn btn--ghost" title="Refresh rates"
                        aria-label="Refresh rates">↻</button>
                </div>
            </header>

            <div class="grid">
                <div class="field">
                    <label for="amount" class="label">Amount</label>
                    <input id="amount" class="input" type="number" inputmode="decimal" min="0" step="0.01"
                        value="1" />
                </div>

                <div class="field">
                    <label for="from" class="label">From</label>
                    <div class="combo">
                        <input id="from" class="input combo__input" list="currency-list"
                            placeholder="Search code or name…" />
                        <button id="clear-from" class="combo__clear" title="Clear">✕</button>
                    </div>
                </div>

                <div class="swap-wrap">
                    <button id="swap" class="btn btn--swap" title="Swap currencies"
                        aria-label="Swap currencies">⇆</button>
                </div>

                <div class="field">
                    <label for="to" class="label">To</label>
                    <div class="combo">
                        <input id="to" class="input combo__input" list="currency-list"
                            placeholder="Search code or name…" />
                        <button id="clear-to" class="combo__clear" title="Clear">✕</button>
                    </div>
                </div>
            </div>

            <datalist id="currency-list">
                <!-- options injected by JS --></datalist>

            <div class="result" aria-live="polite">
                <div class="result__line">
                    <span id="from-amount">1.00</span>
                    <span id="from-code">SGD</span>
                    <span class="result__equals">=</span>
                    <strong id="to-amount">—</strong>
                    <strong id="to-code">MYR</strong>
                </div>
                <div class="result__sub">
                    <span id="rate-line">—</span>
                </div>
            </div>

            <footer class="card__footer">
                <button id="convert" class="btn btn--primary">Convert</button>
                <button id="invert" class="btn btn--ghost">Invert rate</button>
                <button id="share" class="btn btn--ghost">Share</button>
            </footer>
        </section>

        <section class="card card--info">
            <h2 class="label">About</h2>
            <p>Live rates via <a href="https://www.jsdelivr.com/package/npm/@fawazahmed0/currency-api" target="_blank" rel="noopener">currency-api (jsDelivr)</a>.
                Search supports currency codes and names (e.g., “USD”, “Euro”). <br>
                Made with ❤️ by Augy.</p>
        </section>
    </main>

    <template id="toast">
        <div class="toast" role="status"></div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="/script.js"></script>
</body>

</html>
